# Netplan máy Attacker (.30). Copy vào /etc/netplan/01-lab.yaml rồi: sudo netplan apply
# Kali có thể dùng NetworkManager thay netplan — xem docs/network.md.
network:
  version: 2
  ethernets:
    ens33:
      dhcp4: yes
    ens34:
      dhcp4: no
      addresses: [192.168.100.30/24]
      nameservers:
        addresses: [8.8.8.8, 1.1.1.1]
